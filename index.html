<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy April Fool 😜</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  text-align: center;
  max-width: 400px;
  width: 90%;
  animation: pop 0.6s ease;
}

h1 {
  color: #ff4b5c;
  font-size: 32px;
  margin-bottom: 10px;
}

p {
  font-size: 18px;
  color: #333;
  margin-bottom: 25px;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #ff4b5c;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff1f3d;
}

.hidden-message {
  display: none;
  margin-top: 25px;
  font-size: 20px;
  color: #111;
  font-weight: bold;
}

@keyframes pop {
  0% { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

  </style>
</head>
<body>  <div class="card">
    <h1>Happy April Fool 😜</h1>
    <p>Yahan click karo... ek special message hai 👇</p><button onclick="showMessage()">Click Here</button>

<div class="hidden-message" id="msg">
  आप अभिषेक के द्वारा मूर्ख बना दिए गए हैं 🤣😜😂
  <br><br>
  अब शर्माइए मत, हैप्पी मूर्ख दिवस 🤣🎉😂

  <br><br>
  <img src="dance.jpg" width="100%" style="border-radius:15px;">
</div>

  </div>  <script>
    function showMessage() {
      document.getElementById("msg").style.display = "block";
    }

    // Message automatically open when site loads
    window.onload = function() {
      document.getElementById("msg").style.display = "block";
    }
  </script></body>
</html>
